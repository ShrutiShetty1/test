<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SHUBH LABH DISTRIBUTIONS</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Splash Screen -->

<div id="splash">

    <img src="logo.png" id="logo">

</div>

<!-- Map Animation -->

<section id="mapIntro">

    <div id="animationContainer">

        <!-- India SVG will be loaded here -->
        <object id="indiaMap"
                data="india.svg"
                type="image/svg+xml">
        </object>

        <!-- Truck -->

        <img src="truck.png"
             id="truck"
             alt="Truck">

        <!-- Company Name -->

        <div id="companyText">

            <h1>SHUBH LABH DISTRIBUTIONS</h1>

            <p>Delivering Across India</p>

        </div>

    </div>

</section>

<script src="script.js"></script>

</body>

</html>
